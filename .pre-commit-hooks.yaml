- id: prevent-ai-author
  name: prevent AI-authored commits
  description: reject commit messages carrying AI-authorship trailers
  entry: prevent-ai-author.sh
  language: script
  stages: [commit-msg]
  pass_filenames: false
  always_run: true

- id: prevent-author-mismatch
  name: prevent author/committer identity mismatch
  description: block commits whose author/committer doesn't match your global ~/.gitconfig identity
  entry: prevent-author-mismatch.sh
  language: script
  stages: [pre-commit]
  pass_filenames: false
  always_run: true

- id: prevent-unusual-unicode
  name: prevent unusual unicode in commit messages
  description: reject control/zero-width/emoji and other unusual unicode in commit messages
  entry: prevent-unusual-unicode.sh
  language: script
  stages: [commit-msg]
  pass_filenames: false
  always_run: true

- id: prevent-public-push
  name: Prevent pushes outside workspace
  description: block pushes to owners/repos outside the workspace allow-list
  entry: prevent-public-push.sh
  language: script
  stages: [pre-push]
  pass_filenames: false
  always_run: true

- id: no-local-merge
  name: no local git merge
  language: fail
  entry: >-
    Local merges are disabled. Merge via your forge's PR/MR workflow
    (e.g. `gh pr merge`, `glab mr merge`). Override once with
    `git merge --no-verify` if you truly mean it.
  stages: [pre-merge-commit]
  always_run: true
  pass_filenames: false

- id: no-merge-commit
  name: no local merge commit
  entry: no-merge-commit.sh
  language: script
  stages: [pre-commit]
  always_run: true
  pass_filenames: false
